<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub: Your Learning Management Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5CF6;
            --primary-light: #A78BFA;
            --primary-dark: #7C3AED;
            --success: #F59E0B;
            --success-light: #FBBF24;
            --danger: #EF4444;
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.6s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Form Styling */
        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .form-title i {
            color: var(--primary);
        }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        input,
        textarea,
        select {
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #8B5CF6;
            color: white;
            padding: 0.8rem 1.5rem;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-success {
            background: #F59E0B;
            color: white;
            padding: 0.8rem 1.5rem;
        }

        .btn-success:hover {
            background-color: #D97706;
        }

        /* Course List Styling */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .course-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeIn 0.4s ease-out;
            position: relative;
            overflow: hidden;
        }

        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary);
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            align-self: flex-start;
        }

        .status-not-started {
            background: #F1F5F9;
            color: #64748B;
        }

        .status-in-progress {
            background: #FEF3C7;
            color: #B45309;
        }

        .status-completed {
            background: #D1FAE5;
            color: #065F46;
        }

        .course-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .course-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            min-height: 3rem;
        }

        .course-meta {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            margin-top: auto;
        }

        .course-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .btn-icon {
            padding: 0.6rem;
            border-radius: 0.5rem;
            background: #F1F5F9;
            color: var(--text-muted);
        }

        .btn-icon:hover {
            background: #E2E8F0;
            color: var(--text-main);
        }

        .btn-danger {
            background: #EF4444;
            color: white;
            padding: 0.6rem 1rem;
        }

        .btn-danger:hover {
            background: #DC2626;
        }

        .btn-remove:hover {
            background: #FEE2E2;
            color: var(--danger);
        }

        /* Prevent icon from blocking click events on buttons */
        .btn-icon svg {
            pointer-events: none;
        }

        /* Prevent icon from blocking click events on buttons */
        .btn-icon svg {
            pointer-events: none;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 600px;
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        .loader-overlay {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 2000;
            display: none;
        }

        .toast {
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            background: white;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
            transform: translateX(120%);
            transition: transform 0.3s ease-in-out;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.success {
            border-left: 4px solid #10B981;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid-form {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="loader-overlay" id="toast-container">
        <div id="toast" class="toast">
            <span id="toast-msg"></span>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>CodeCraftHub</h1>
            <p class="subtitle">Your Personal Learning Management Platform</p>
        </header>

        <!-- ADD COURSE FORM -->
        <div class="card">
            <div class="form-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="16"></line>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
                Add New Course
            </div>
            <form id="add-course-form" class="grid-form">
                <div class="form-group full-width">
                    <label for="name">Course Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Master Flask REST APIs" required>
                </div>
                <div class="form-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3"
                        placeholder="What will you learn in this course?" required></textarea>
                </div>
                <div class="form-group">
                    <label for="target_date">Target Completion Date</label>
                    <input type="date" id="target_date" name="target_date" required>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" name="status" required>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="form-group full-width" style="margin-top: 1rem;">
                    <button type="submit" class="btn-primary" id="submit-btn" style="width: 100%;">
                        <span id="btn-text">Add Course</span>
                        <div id="btn-spinner" class="spinner" style="display: none;"></div>
                    </button>
                </div>
            </form>
        </div>

        <!-- COURSE LIST -->
        <div class="list-header">
            <h2>Your Courses</h2>
            <div id="course-count" class="status-badge status-not-started">0 total</div>
        </div>

        <div id="course-list" class="course-grid">
            <!-- Courses will be loaded here dynamically -->
        </div>
    </div>

    <!-- UPDATE MODAL -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="form-title">Edit Course</div>
            <form id="edit-course-form" class="grid-form">
                <input type="hidden" id="edit-id">
                <div class="form-group full-width">
                    <label for="edit-name">Course Name</label>
                    <input type="text" id="edit-name" name="name" required>
                </div>
                <div class="form-group full-width">
                    <label for="edit-description">Description</label>
                    <textarea id="edit-description" name="description" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-target_date">Target Date</label>
                    <input type="date" id="edit-target_date" name="target_date" required>
                </div>
                <div class="form-group">
                    <label for="edit-status">Status</label>
                    <select id="edit-status" name="status" required>
                        <option value="Not Started">Not Started</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="card-actions" style="grid-column: span 2; margin-top: 1rem;">
                    <button type="button" class="btn-icon" onclick="closeModal()" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn-success" id="save-btn" style="flex: 2;">
                        Save Changes
                        <div id="save-spinner" class="spinner" style="display: none;"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Global error logging for debugging
        window.onerror = function (msg, url, line) {
            console.error('JS Error: ' + msg + ' at ' + url + ':' + line);
            return false;
        };

        // Use a relative path to avoid CORS/Origin issues if accessing via localhost vs 127.0.0.1
        const API_URL = '/api/courses';

        // --- UI ELEMENTS ---
        const courseList = document.getElementById('course-list');
        const courseCount = document.getElementById('course-count');
        const addForm = document.getElementById('add-course-form');
        const editForm = document.getElementById('edit-course-form');
        const editModal = document.getElementById('edit-modal');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');
        const toastContainer = document.getElementById('toast-container');

        // --- CORE FUNCTIONS ---

        async function fetchCourses() {
            setLoading('course-list', true);
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderCourses(data.courses);
                courseCount.textContent = `${data.count} total`;
            } catch (error) {
                showToast('Failed to load courses', 'error');
                courseList.innerHTML = `<p style="text-align:center; grid-column:1/-1; color:var(--danger)">Error connecting to API. Is the Flask server running?</p>`;
            } finally {
                setLoading('course-list', false);
            }
        }

        function renderCourses(courses) {
            if (courses.length === 0) {
                courseList.innerHTML = `<p style="text-align:center; grid-column:1/-1; color:var(--text-muted); padding: 3rem;">No courses found. Start adding one above!</p>`;
                return;
            }

            courseList.innerHTML = courses.map(course => {
                const statusClass = course.status.toLowerCase().replace(' ', '-');
                const date = new Date(course.created_at).toLocaleDateString();

                return `
                    <div class="course-card">
                        <span class="status-badge status-${statusClass}">${course.status}</span>
                        <h3>${course.name}</h3>
                        <p class="course-desc">${course.description}</p>
                        <div class="course-meta">
                            <span>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                Target: ${course.target_date}
                            </span>
                            <span>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-6M9 20v-10M15 20v-2M12 4V2M18 8V6M6 8V6"></path></svg>
                                Created: ${date}
                            </span>
                        </div>
                        <div class="card-actions">
                            <button class="btn-icon btn-edit" onclick="window.handleEdit(this)" data-id="${course.id}" data-name="${course.name.replace(/'/g, "&apos;").replace(/"/g, "&quot;")}" data-desc="${course.description.replace(/'/g, "&apos;").replace(/"/g, "&quot;")}" data-target="${course.target_date}" data-status="${course.status}" title="Edit">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="btn-danger" onclick="window.handleDelete(${course.id})">Remove</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- REFACTORED: HELPERS FOR ATTACHING TO WINDOW ---
        window.handleEdit = function (btn) {
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            const desc = btn.getAttribute('data-desc');
            const target = btn.getAttribute('data-target');
            const status = btn.getAttribute('data-status');
            window.openEditModal(id, name, desc, target, status);
        };

        // --- CRUD ACTIONS ---

        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(addForm);
            const courseData = Object.fromEntries(formData);

            toggleBtnLoading('submit-btn', true);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(courseData)
                });

                if (response.ok) {
                    showToast('Course added successfully!', 'success');
                    addForm.reset();
                    fetchCourses();
                } else {
                    const error = await response.json();
                    showToast(error.error || 'Failed to add course', 'error');
                }
            } catch (error) {
                showToast('Network error occurred', 'error');
            } finally {
                toggleBtnLoading('submit-btn', false);
            }
        });

        async function handleDelete(id) {
            console.log('Delete requested for ID:', id);

            // Proceed directly to delete to avoid issues with browser confirm dialogs
            try {
                // Ensure the URL is correctly constructed
                const deleteUrl = `${API_URL}/${id}`;
                console.log('Fetching DELETE:', deleteUrl);

                const response = await fetch(deleteUrl, {
                    method: 'DELETE',
                    headers: { 'Accept': 'application/json' }
                });

                console.log('Response received:', response.status);

                if (response.ok) {
                    showToast('Course removed successfully!', 'success');
                    await fetchCourses(); // Reload the list
                } else {
                    const error = await response.json();
                    console.error('Server error on delete:', error);
                    showToast(error.error || 'Failed to delete course', 'error');
                }
            } catch (error) {
                console.error('Network error on delete:', error);
                showToast('Network error: Could not reach server', 'error');
            }
        }

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const formData = new FormData(editForm);
            const courseData = Object.fromEntries(formData);

            toggleBtnLoading('save-btn', true);

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(courseData)
                });

                if (response.ok) {
                    showToast('Changes saved!', 'success');
                    closeModal();
                    fetchCourses();
                } else {
                    const error = await response.json();
                    showToast(error.error || 'Update failed', 'error');
                }
            } catch (error) {
                showToast('Network error occurred', 'error');
            } finally {
                toggleBtnLoading('save-btn', false);
            }
        });

        // --- BIND FUNCTIONS TO WINDOW FOR ACCESSIBILITY ---
        window.handleDelete = handleDelete;
        window.openEditModal = openEditModal;
        window.closeModal = closeModal;

        function openEditModal(id, name, desc, target, status) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-description').value = desc;
            document.getElementById('edit-target_date').value = target;
            document.getElementById('edit-status').value = status;
            editModal.style.display = 'flex';
        }

        function closeModal() {
            editModal.style.display = 'none';
        }

        function showToast(msg, type = 'success') {
            toastMsg.textContent = msg;
            toast.className = `toast ${type}`;
            toastContainer.style.display = 'block';
            setTimeout(() => toast.classList.add('show'), 100);

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => { toastContainer.style.display = 'none'; }, 300);
            }, 3000);
        }

        function toggleBtnLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            const text = btn.querySelector('span') || btn.childNodes[0];
            const spinner = btn.querySelector('.spinner');

            if (isLoading) {
                btn.disabled = true;
                if (text.style) text.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                if (text.style) text.style.display = 'inline';
                spinner.style.display = 'none';
            }
        }

        function setLoading(elementId, isLoading) {
            const el = document.getElementById(elementId);
            if (isLoading) {
                el.style.opacity = '0.5';
                el.style.pointerEvents = 'none';
            } else {
                el.style.opacity = '1';
                el.style.pointerEvents = 'auto';
            }
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            if (event.target == editModal) closeModal();
        }

        // INIT
        fetchCourses();
    </script>
</body>

</html>
